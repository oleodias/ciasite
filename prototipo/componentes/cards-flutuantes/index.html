<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ciamed — Cards flutuantes (inspirado na GSK)</title>
<style>
@font-face{font-family:'Sora';src:url('../../assets/fonts/sora-latin.woff2') format('woff2');font-weight:100 900;font-display:swap}
:root{--teal:#00b3b2;--teal-deep:#0a6b6a;--teal-dark:#04403f;--mint:#8af0ef;--ink:#0a2b2a;--gray:#5f7a77;--line:#e3edeb;--mist:#f1f8f6;--display:'Sora','Helvetica Neue',Arial,sans-serif;--font:'Helvetica Neue',Helvetica,Arial,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);color:var(--ink);background:#fff;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.container{max-width:1180px;margin:0 auto;padding:0 28px}
.accent{color:var(--teal)}
h2{font-family:var(--display);font-weight:700;letter-spacing:-.02em;line-height:1.08}

.disc{padding:96px 0 110px}
.disc-top{text-align:center;margin-bottom:26px}
.disc-top .k{font-weight:600;font-size:.78rem;letter-spacing:.24em;text-transform:uppercase;color:var(--teal);display:inline-block;margin-bottom:14px}
.disc-top h2{font-size:clamp(1.9rem,3.8vw,2.9rem)}

/* controles */
.ctrl{display:flex;align-items:center;justify-content:center;gap:18px;margin:26px 0 44px}
.ctrl .count{font-family:var(--display);font-weight:600;font-size:.9rem;color:var(--ink);font-variant-numeric:tabular-nums}
.ctrl .bar{width:150px;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
.ctrl .bar i{display:block;height:100%;width:0;background:var(--teal);border-radius:2px}
.ctrl .bar i.run{animation:prog var(--dur,5s) linear forwards}
@keyframes prog{from{width:0}to{width:100%}}
.ctrl button{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--line);background:#fff;color:var(--teal-deep);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.2s}
.ctrl button:hover{border-color:var(--teal);background:var(--mist)}
.ctrl button svg{width:16px;height:16px;fill:currentColor}

/* palco */
.stage{position:relative;height:560px}
.slide-title{position:absolute;left:0;top:6px;max-width:440px;font-family:var(--display);font-weight:700;font-size:clamp(1.4rem,2.4vw,2rem);line-height:1.18;letter-spacing:-.02em;z-index:5;transition:opacity .5s,transform .5s}
/* card principal (formato orgânico) */
.main-card{position:absolute;left:60px;top:128px;width:620px;height:400px;border-radius:26px;overflow:hidden;box-shadow:0 44px 80px -40px rgba(4,64,63,.55);z-index:4}
.main-card .ph{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity .6s ease}
.main-card .ph.b{opacity:0}
/* setinha no "recorte" superior-esquerdo */
.arrow-btn{position:absolute;left:26px;top:150px;width:66px;height:66px;border-radius:50%;background:#fff;box-shadow:0 14px 30px -14px rgba(4,64,63,.4);display:flex;align-items:center;justify-content:center;z-index:6;cursor:pointer;transition:.25s}
.arrow-btn:hover{transform:translateX(4px);background:var(--mist)}
.arrow-btn svg{width:22px;height:22px;stroke:var(--teal);fill:none;stroke-width:2.2}
/* cards flutuantes menores (espiando) */
.peek{position:absolute;border-radius:18px;overflow:hidden;box-shadow:0 30px 60px -34px rgba(4,64,63,.5);z-index:2}
.peek .ph{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity .6s ease}
.peek.p1{width:320px;height:210px;right:-30px;top:20px}
.peek.p2{width:250px;height:170px;right:60px;bottom:10px}
.peek.p3{width:180px;height:230px;left:-70px;top:150px;opacity:.9}
.disc-cta{text-align:center;margin-top:60px}
.btn{display:inline-flex;align-items:center;gap:10px;font-weight:600;font-size:.98rem;padding:15px 30px;border-radius:999px;background:var(--teal);color:#fff;transition:.25s;text-decoration:none;box-shadow:0 16px 34px -16px rgba(0,179,178,.7)}
.btn:hover{background:var(--teal-deep);transform:translateY(-2px)}

.note{position:fixed;left:14px;bottom:14px;z-index:200;background:#04403f;color:#cff;font-size:.72rem;padding:8px 12px;border-radius:8px;max-width:340px;opacity:.94}

@media(max-width:980px){
  .stage{height:auto;display:flex;flex-direction:column;gap:18px}
  .slide-title{position:static;max-width:none;margin-bottom:6px}
  .main-card{position:static;left:0;top:0;width:100%;height:300px}
  .arrow-btn{display:none}
  .peek{position:static;width:100%!important;height:150px!important}
  .peek.p3{display:none}
}
</style>
</head>
<body>

<section class="disc">
  <div class="container">
    <div class="disc-top">
      <span class="k">Descubra a Ciamed</span>
      <h2>Descubra como <span class="accent">avançamos</span></h2>
    </div>

    <div class="ctrl">
      <span class="count" id="count">01 / 05</span>
      <div class="bar"><i id="prog"></i></div>
      <button id="prev" aria-label="Anterior"><svg viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6z"/></svg></button>
      <button id="play" aria-label="Pausar"><svg viewBox="0 0 24 24" id="playIco"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg></button>
      <button id="next" aria-label="Próximo"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6z"/></svg></button>
    </div>

    <div class="stage">
      <div class="slide-title" id="stitle"></div>
      <div class="main-card">
        <div class="ph a" id="mainA"></div>
        <div class="ph b" id="mainB"></div>
      </div>
      <div class="arrow-btn" id="arrow" aria-label="Próximo"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
      <div class="peek p1"><div class="ph" id="peek1"></div></div>
      <div class="peek p2"><div class="ph" id="peek2"></div></div>
      <div class="peek p3"><div class="ph" id="peek3"></div></div>
    </div>

    <div class="disc-cta"><a href="#" class="btn">Conheça a Ciamed →</a></div>
  </div>
</section>

<div class="note">🎬 Componente — <b>Cards flutuantes</b> (inspirado na GSK). Autoplay + progresso + play/pause + ‹ ›. Fotos = frames do nosso vídeo.</div>

<script>
const SLIDES=[
  {img:'img/frame-01.jpg',title:'Presentes onde a vida precisa'},
  {img:'img/frame-05.jpg',title:'Cuidar das pessoas pode mudar o mundo'},
  {img:'img/frame-03.jpg',title:'Agilidade e rastreabilidade em cada entrega'},
  {img:'img/frame-04.jpg',title:'Atendimento especializado que a saúde exige'},
  {img:'img/frame-02.jpg',title:'Nós zelamos pela vida'},
];
const N=SLIDES.length, DUR=5000;
const mainA=document.getElementById('mainA'),mainB=document.getElementById('mainB');
const peek1=document.getElementById('peek1'),peek2=document.getElementById('peek2'),peek3=document.getElementById('peek3');
const stitle=document.getElementById('stitle'),count=document.getElementById('count'),prog=document.getElementById('prog');
const playIco=document.getElementById('playIco');
let idx=0, useA=true, playing=true, timer=null;
const url=s=>`url('${s}')`;

function setImg(el,src){el.style.opacity=0;setTimeout(()=>{el.style.backgroundImage=url(src);el.style.opacity=1},260);}
function render(){
  // troca a imagem principal com cross-fade entre 2 camadas
  const front=useA?mainA:mainB, back=useA?mainB:mainA;
  back.style.backgroundImage=url(SLIDES[idx].img);
  back.style.opacity=1; front.style.opacity=0; useA=!useA;
  // cards menores = próximos slides
  setImg(peek1,SLIDES[(idx+1)%N].img);
  setImg(peek2,SLIDES[(idx+2)%N].img);
  setImg(peek3,SLIDES[(idx+3)%N].img);
  // título + contador
  stitle.style.opacity=0;stitle.style.transform='translateY(8px)';
  setTimeout(()=>{stitle.textContent=SLIDES[idx].title;stitle.style.opacity=1;stitle.style.transform='none'},220);
  count.textContent=String(idx+1).padStart(2,'0')+' / '+String(N).padStart(2,'0');
  restartProg();
}
function restartProg(){prog.classList.remove('run');void prog.offsetWidth;prog.style.setProperty('--dur',DUR+'ms');if(playing)prog.classList.add('run');else prog.style.width='0';}
function go(n){idx=(n+N)%N;render();schedule();}
function schedule(){clearTimeout(timer);if(playing)timer=setTimeout(()=>go(idx+1),DUR);}
function toggle(){playing=!playing;playIco.innerHTML=playing?'<path d="M7 5h4v14H7zM13 5h4v14h-4z"/>':'<path d="M8 5v14l11-7z"/>';if(playing){restartProg();schedule();}else{clearTimeout(timer);prog.classList.remove('run');}}
document.getElementById('next').onclick=()=>go(idx+1);
document.getElementById('arrow').onclick=()=>go(idx+1);
document.getElementById('prev').onclick=()=>go(idx-1);
document.getElementById('play').onclick=toggle;
// init
mainA.style.backgroundImage=url(SLIDES[0].img);mainA.style.opacity=1;
render();schedule();
</script>
</body>
</html>
