<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Ciamed — Componente · Destaques (remaster "Capa viva")</title>
    <!--
      ==========================================================================
      COMPONENTE ISOLADO: "Destaques" remasterizado (Molde 08 · Autoridade)
      --------------------------------------------------------------------------
      Versão "Capa viva": manchete com palavras em cascata, moldura em arco com
      transição de cortina (clip-path) + tilt no mouse + PROPORÇÃO ADAPTATIVA à
      resolução real de cada foto, botões prev/next com anel de progresso do
      autoplay e fila "a seguir" com as 4 notícias.

      Fonte dos dados: window.NOTICIAS (prototipo/.../noticias/dados.js).
      Mesmos caminhos do componente antigo — funciona nesta pasta sem ajuste.

      Reintegração na home:
        - CSS  -> dentro do <style> do molde (região ".destaques ...")
        - HTML -> <section class="block destaques" id="destaques"> ... </section>
        - JS   -> região "// DESTAQUES" do <script> do molde
        (na home, reescrever "../../" das imagens para "../", como já era feito)
      ==========================================================================
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Franklin:wght@500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ---- tokens da marca ---- */
      :root {
        --teal: #00b3b2;
        --teal-deep: #0a6b6a;
        --teal-dark: #04403f;
        --mint: #8af0ef;
        --ink: #0a2b2a;
        --gray: #6e6e6e;
        --line: #e3edeb;
        --mist: #f1f8f6;
        --paper: #fff;
        --sage: #9db5b1;
        --maxw: 1180px;
        --font: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
        --display: "Libre Franklin", "Helvetica Neue", Arial, sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font);
        color: var(--ink);
        background: #fbfdfd;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      a { color: inherit; text-decoration: none; }
      .container { max-width: var(--maxw); margin: 0 auto; padding: 0 28px; }
      section.block { padding: 100px 0; }

      /* =====================================================================
         BLOCO DESTAQUES (remaster) — estilos próprios
         ===================================================================== */
      @keyframes destWordIn {
        from { opacity: 0; transform: translateY(0.55em) rotate(1.5deg); }
        to { opacity: 1; transform: none; }
      }
      @keyframes destMetaIn {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: none; }
      }
      @keyframes destRingFill {
        from { stroke-dashoffset: 163; }
        to { stroke-dashoffset: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .destaques * { animation: none !important; transition: none !important; }
      }

      .destaques { background: #fbfdfd; }
      .dest-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 64px;
        align-items: stretch;
      }

      /* coluna editorial */
      .dest-text {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 520px;
        padding: 8px 0;
      }
      .dest-kicker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 0.74rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--teal-deep);
        font-weight: 600;
        margin-bottom: 22px;
        animation: destMetaIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }
      .dest-kicker::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--teal);
      }
      .dest-title {
        font-family: var(--display);
        font-weight: 800;
        font-size: clamp(2.1rem, 3.9vw, 3.3rem);
        line-height: 1.06;
        letter-spacing: -0.03em;
        color: var(--ink);
        margin-bottom: 24px;
        max-width: 15ch;
      }
      .dest-title .w {
        display: inline-block;
        overflow: hidden;
        vertical-align: bottom;
        padding-bottom: 0.08em;
        margin-right: 0.28ch;
      }
      .dest-title .w > span {
        display: inline-block;
        animation: destWordIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }
      .dest-meta2 { animation: destMetaIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) 0.25s both; }
      .dest-excerpt {
        color: var(--gray);
        font-size: 1.04rem;
        max-width: 46ch;
        margin-bottom: 32px;
      }
      .dest-cta {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 0.95rem;
        padding: 14px 28px;
        border-radius: 999px;
        background: var(--teal-dark);
        color: #fff;
        transition: 0.25s;
        white-space: nowrap;
      }
      .dest-cta:hover { background: var(--teal); gap: 16px; }

      /* controles */
      .dest-ctrl {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-top: 48px;
      }
      .dest-ctrl .arrow {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        border: 1.6px solid var(--line);
        background: #fff;
        color: var(--teal-deep);
        font-size: 1.1rem;
        font-family: inherit;
        cursor: pointer;
        transition: 0.25s;
        display: grid;
        place-items: center;
      }
      .dest-ctrl .arrow:hover { border-color: var(--teal); color: var(--teal); }
      .dest-ctrl .arrow.next {
        position: relative;
        border: none;
        box-shadow: 0 8px 20px -10px rgba(4, 64, 63, 0.3);
      }
      .dest-ctrl .arrow.next svg {
        position: absolute;
        inset: 0;
        transform: rotate(-90deg);
        pointer-events: none;
      }
      .dest-ctrl .arrow.next .ring {
        stroke-dasharray: 163;
        animation: destRingFill var(--dest-secs, 7s) linear forwards;
      }
      .destaques:hover .dest-ctrl .arrow.next .ring { animation-play-state: paused; }
      .dest-count {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 0.82rem;
        color: var(--sage);
        letter-spacing: 0.08em;
        white-space: nowrap;
      }

      /* visual: moldura adaptativa em arco */
      .dest-visual {
        position: relative;
        display: grid;
        place-items: center;
      }
      .dest-deco {
        position: absolute;
        left: -34px;
        bottom: -26px;
        width: 132px;
        height: 150px;
        background-image: radial-gradient(var(--teal) 1.6px, transparent 1.7px);
        background-size: 15px 15px;
        opacity: 0.4;
        z-index: 1;
      }
      .dest-frame {
        position: relative;
        z-index: 2;
        border-radius: 200px 200px 22px 22px;
        overflow: hidden;
        box-shadow: 0 60px 100px -50px rgba(4, 64, 63, 0.5);
        background: #dfeeeb;
        transition:
          transform 0.35s ease-out,
          width 0.9s cubic-bezier(0.7, 0, 0.2, 1),
          height 0.9s cubic-bezier(0.7, 0, 0.2, 1),
          border-radius 0.9s cubic-bezier(0.7, 0, 0.2, 1);
      }
      .dest-frame .layer {
        position: absolute;
        inset: 0;
        background: #dfeeeb center/cover no-repeat;
        clip-path: inset(0 0 0 100%);
        z-index: 1;
        transition: clip-path 0s 0.9s;
      }
      .dest-frame .layer.on {
        clip-path: inset(0 0 0 0);
        z-index: 2;
        transition: clip-path 0.9s cubic-bezier(0.7, 0, 0.2, 1);
      }
      .dest-frame::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(4, 64, 63, 0.3), transparent 40%);
        pointer-events: none;
        z-index: 3;
      }

      /* fila "a seguir" */
      .dest-queue {
        margin-top: 84px;
        border-top: 1px solid var(--line);
        padding-top: 10px;
      }
      .dest-queue-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
      }
      .dest-q {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 22px 18px 20px;
        background: none;
        border: none;
        border-left: 1px solid var(--line);
        text-align: left;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.3s;
        min-width: 0;
      }
      .dest-q:hover { background: var(--mist); }
      .dest-q::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        right: 0;
        height: 2px;
        background: transparent;
      }
      .dest-q.on::before { background: var(--teal); }
      .dest-q .n {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 0.74rem;
        color: var(--sage);
        letter-spacing: 0.08em;
      }
      .dest-q .t {
        font-family: var(--display);
        font-weight: 700;
        font-size: 0.94rem;
        line-height: 1.3;
        letter-spacing: -0.01em;
        color: var(--sage);
        transition: color 0.3s;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .dest-q.on .t { color: var(--ink); }
      .dest-q .d {
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--sage);
        font-weight: 600;
      }

      @media (max-width: 900px) {
        .dest-grid { grid-template-columns: 1fr; gap: 44px; }
        .dest-text { min-height: 0; }
        .dest-frame { border-radius: 90px 90px 18px 18px !important; }
        .dest-deco { display: none; }
        .dest-queue-grid { grid-template-columns: 1fr 1fr; }
        .dest-q { border-left: none; border-bottom: 1px solid var(--line); }
      }
    </style>
  </head>
  <body>
    <!-- =====================================================================
         BLOCO DESTAQUES (remaster) — markup
         ===================================================================== -->
    <section class="block destaques" id="destaques">
      <div class="container">
        <div class="dest-grid">
          <!-- coluna editorial -->
          <div class="dest-text">
            <div>
              <span class="dest-kicker" id="destKicker"></span>
              <h2 class="dest-title" id="destTitle"></h2>
              <div class="dest-meta2" id="destMeta2">
                <p class="dest-excerpt" id="destExcerpt"></p>
                <a href="#" class="dest-cta" id="destLink">Leia mais →</a>
              </div>
            </div>
            <div class="dest-ctrl">
              <button class="arrow" id="destPrev" aria-label="Anterior">←</button>
              <button class="arrow next" id="destNext" aria-label="Próximo">
                →
                <svg width="54" height="54" viewBox="0 0 54 54">
                  <circle cx="27" cy="27" r="26" fill="none" stroke="#e3edeb" stroke-width="1.6"></circle>
                  <circle class="ring" id="destRing" cx="27" cy="27" r="26" fill="none" stroke="#00b3b2" stroke-width="1.6" stroke-linecap="round"></circle>
                </svg>
              </button>
              <span class="dest-count" id="destCount"></span>
            </div>
          </div>

          <!-- visual: moldura adaptativa -->
          <div class="dest-visual" id="destVisual">
            <div class="dest-deco"></div>
            <div class="dest-frame" id="destFrame"></div>
          </div>
        </div>

        <!-- a seguir -->
        <div class="dest-queue">
          <div class="dest-queue-grid" id="destQueue"></div>
        </div>
      </div>
    </section>

    <!-- base de noticias (compartilhada com a aba Noticias) -->
    <script src="../../molde-08-autoridade/noticias/dados.js"></script>
    <script>
      // =====================================================================
      // BLOCO DESTAQUES (remaster "Capa viva") — motor
      // Fonte: window.NOTICIAS (dados.js). Imagens com caminho cru de dados.js
      // ("../../assets/noticias/..."). Na home, reescrever para "../".
      // =====================================================================
      const DEST_SECS = 7; // autoplay (s)
      const artUrl = (id) =>
        "../../molde-08-autoridade/noticias/artigo.html?id=" + encodeURIComponent(id);

      const NEWS = (window.NOTICIAS || []).slice(0, 4).map((n) => ({
        img: n.imagem,
        date: n.dataLabel,
        title: n.titulo,
        excerpt: n.resumo,
        href: artUrl(n.id),
        ratio: 0.8, // proporção padrão até a foto carregar
      }));

      const $ = (id) => document.getElementById(id);
      const section = $("destaques"),
        destKicker = $("destKicker"),
        destTitle = $("destTitle"),
        destMeta2 = $("destMeta2"),
        destExcerpt = $("destExcerpt"),
        destLink = $("destLink"),
        destCount = $("destCount"),
        destRing = $("destRing"),
        destFrame = $("destFrame"),
        destVisual = $("destVisual"),
        destQueue = $("destQueue");
      document.documentElement.style.setProperty("--dest-secs", DEST_SECS + "s");

      let dIdx = 0,
        dTimer = null;

      if (NEWS.length) {
        // camadas de imagem (cortina clip-path)
        NEWS.forEach((n, i) => {
          const l = document.createElement("div");
          l.className = "layer";
          l.style.backgroundImage = `url('${n.img}')`;
          destFrame.appendChild(l);
          // mede a resolução real da foto -> moldura adaptativa
          const im = new Image();
          im.onload = () => {
            n.ratio = im.naturalWidth / im.naturalHeight;
            if (i === dIdx) dFitFrame();
          };
          im.src = n.img;
        });
        // fila "a seguir"
        NEWS.forEach((n, i) => {
          const b = document.createElement("button");
          b.className = "dest-q";
          b.innerHTML =
            '<span class="n">0' + (i + 1) + "</span>" +
            '<span class="t"></span>' +
            '<span class="d"></span>';
          b.querySelector(".t").textContent = n.title;
          b.querySelector(".d").textContent = n.date;
          b.onclick = () => dGo(i);
          destQueue.appendChild(b);
        });
        $("destPrev").onclick = () => dGo(dIdx - 1);
        $("destNext").onclick = () => dGo(dIdx + 1);
        // pausa autoplay enquanto o mouse está sobre o bloco
        section.addEventListener("mouseenter", () => clearTimeout(dTimer));
        section.addEventListener("mouseleave", dSchedule);
        // tilt 3D seguindo o mouse
        destVisual.addEventListener("mousemove", (e) => {
          const r = destVisual.getBoundingClientRect();
          const px = (e.clientX - r.left) / r.width - 0.5;
          const py = (e.clientY - r.top) / r.height - 0.5;
          destFrame.style.transform =
            "perspective(1100px) rotateX(" + -py * 4 + "deg) rotateY(" + px * 5 + "deg)";
        });
        destVisual.addEventListener("mouseleave", () => (destFrame.style.transform = ""));
        window.addEventListener("resize", dFitFrame);
        dRender();
        dSchedule();
      }

      // moldura adaptativa: altura alvo constante, largura segue a proporção
      function dFitFrame() {
        const ratio = Math.min(1.6, Math.max(0.65, NEWS[dIdx].ratio || 0.8));
        const colW = destVisual.offsetWidth || 480;
        const h = Math.min(560, Math.round(colW / ratio));
        const w = Math.min(colW, Math.round(h * ratio));
        destFrame.style.width = w + "px";
        destFrame.style.height = h + "px";
        destFrame.style.borderRadius =
          ratio < 1.05 ? "200px 200px 22px 22px" : "90px 90px 22px 22px";
      }

      function dRender() {
        const s = NEWS[dIdx];
        // kicker + resumo com entrada escalonada (reinicia animação)
        destKicker.textContent = s.date + " · Destaque 0" + (dIdx + 1);
        destExcerpt.textContent = s.excerpt;
        destLink.href = s.href;
        [destKicker, destMeta2].forEach((el) => {
          el.style.animation = "none";
          void el.offsetWidth;
          el.style.animation = "";
        });
        // manchete: palavras em cascata
        destTitle.innerHTML = "";
        s.title.split(" ").forEach((word, i) => {
          const outer = document.createElement("span");
          outer.className = "w";
          const inner = document.createElement("span");
          inner.textContent = word;
          inner.style.animationDelay = 0.06 * i + "s";
          outer.appendChild(inner);
          destTitle.appendChild(outer);
        });
        // cortina de imagem + moldura adaptativa
        [...destFrame.querySelectorAll(".layer")].forEach((l, i) =>
          l.classList.toggle("on", i === dIdx),
        );
        dFitFrame();
        // contador + fila + anel de progresso
        destCount.textContent = "0" + (dIdx + 1) + " / 0" + NEWS.length;
        [...destQueue.children].forEach((b, i) => b.classList.toggle("on", i === dIdx));
        destRing.style.animation = "none";
        void destRing.getBoundingClientRect();
        destRing.style.animation = "";
      }

      function dGo(i) {
        dIdx = (i + NEWS.length) % NEWS.length;
        dRender();
        dSchedule();
      }

      function dSchedule() {
        clearTimeout(dTimer);
        dTimer = setTimeout(() => dGo(dIdx + 1), DEST_SECS * 1000);
      }
    </script>
  </body>
</html>
